# Publishes the headless CLI as a container image to GHCR
# (ghcr.io/<owner>/maelstrom-cli). Uses the built-in GITHUB_TOKEN — no extra
# secret needed. The package is created private; make it public once in the
# repo's Packages settings for anonymous `docker pull`.

name: CLI Docker image

on:
  workflow_dispatch:
  push:
    branches: ["release/**"]
    paths:
      - "Dockerfile"
      - "cli/**"
      - "core/**"
      - "db/**"
      - "grpc/**"
      - ".github/workflows/docker-cli.yml"

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false   # clean single-arch image (no "unknown/unknown" attestation entry)
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/maelstrom-cli:0.3.0
            ghcr.io/${{ github.repository_owner }}/maelstrom-cli:latest
