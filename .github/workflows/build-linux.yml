name: Build Linux

# Builds the desktop app for Linux: .deb (Debian/Ubuntu/Mint/Pop!_OS),
# .rpm (Fedora/RHEL/openSUSE) and .AppImage (any distro, no install).
# Run manually (Actions -> Build Linux -> Run workflow) or on tag v*.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libxdo-dev build-essential file
      - run: npm ci
      - name: Build .deb / .rpm / .AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1" # avoid the FUSE requirement on CI runners
        run: npx tauri build
      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: Maelstrom-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
