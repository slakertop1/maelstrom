name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Rust engine + CLI (test, clippy, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy -p maelstrom-core -p maelstrom-cli --all-targets -- -D warnings
      - name: Test
        run: cargo test -p maelstrom-core -p maelstrom-cli
      - name: Build release CLI
        run: cargo build --release -p maelstrom-cli

  frontend:
    name: Frontend (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test

  app-build:
    name: Desktop app compiles (Tauri / Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - name: Build frontend (dist for Tauri context)
        run: npm run build
      - name: Compile Tauri app
        run: cargo build -p maelstrom-app

  docker:
    name: CLI Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t maelstrom-cli:ci .
