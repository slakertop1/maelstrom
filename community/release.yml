# Автопубликация релизов Maelstrom.
#
# По тегу vX.Y.Z (или ручным запуском workflow_dispatch с указанием тега) собирает:
#   • десктоп: Windows (MSI + портативка) и macOS (universal dmg)
#   • CLI: бинарники Windows / macOS (universal) / Linux
#   • Docker-образ CLI → ghcr.io/<owner>/maelstrom-cli (для k8s)
# и публикует их в Releases ПУБЛИЧНОГО репозитория (код не уходит).
#
# Нужен секрет RELEASE_TOKEN — fine-grained PAT с правом Contents: Read and write
# на публичный репозиторий. Docker-образ в GHCR пушится встроенным GITHUB_TOKEN.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to (e.g. v0.1.0)"
        required: true

env:
  RELEASE_REPO: slakertop1/maelstrom-releases

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build
      - name: Portable copy
        run: Copy-Item target/release/maelstrom-app.exe Maelstrom.exe
      - name: Build CLI
        run: cargo build --release -p maelstrom-cli
      - name: Name CLI binary
        run: Copy-Item target/release/maelstrom.exe maelstrom-windows-x64.exe
      - uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/release/bundle/msi/*.msi
            Maelstrom.exe
            maelstrom-windows-x64.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-apple-darwin,x86_64-apple-darwin" }
      - run: npm ci
      - run: npm run tauri build -- --target universal-apple-darwin
      - name: Build CLI (universal)
        run: |
          cargo build --release -p maelstrom-cli --target aarch64-apple-darwin
          cargo build --release -p maelstrom-cli --target x86_64-apple-darwin
          lipo -create -output maelstrom-macos \
            target/aarch64-apple-darwin/release/maelstrom \
            target/x86_64-apple-darwin/release/maelstrom
      - uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            maelstrom-macos

  linux-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libxdo-dev build-essential file
      - run: npm ci
      - name: Build .deb / .rpm / .AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npm run tauri build
      - uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage

  linux-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build CLI
        run: cargo build --release -p maelstrom-cli
      - name: Name CLI binary
        run: cp target/release/maelstrom maelstrom-linux-x64
      - uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: maelstrom-linux-x64
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/maelstrom-cli:${{ github.event.inputs.tag || github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/maelstrom-cli:latest
