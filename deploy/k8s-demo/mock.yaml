# Tiny in-cluster service under load for the k8s demo: a stateful login/token
# flow so the CLI's request-chaining (login → extract token → use it) is
# actually exercised end to end. NOT a production service — just enough to prove
# the chain threads a per-iteration value under load.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-src
data:
  server.py: |
    import json
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    seq = 0
    issued = set()  # one-shot tokens; consumed exactly once by /order

    class H(BaseHTTPRequestHandler):
        def reply(self, code, obj):
            body = json.dumps(obj).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_POST(self):
            global seq
            if self.path.startswith("/login"):
                seq += 1
                tok = f"T-{seq}"
                issued.add(tok)
                self.reply(200, {"data": {"token": tok}})
            else:
                self.reply(404, {})

        def do_GET(self):
            if self.path.startswith("/health"):
                self.reply(200, {"ok": True})
            elif self.path.startswith("/order"):
                auth = self.headers.get("Authorization", "")
                tok = auth[7:] if auth.startswith("Bearer ") else ""
                if tok in issued:
                    issued.discard(tok)
                    self.reply(200, {"order": "ok", "score": 0.97})
                else:
                    self.reply(401, {"error": "no token"})
            else:
                self.reply(404, {})

        def log_message(self, *a):
            pass

    ThreadingHTTPServer(("0.0.0.0", 8080), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock
  labels: { app: mock }
spec:
  replicas: 1
  selector: { matchLabels: { app: mock } }
  template:
    metadata:
      labels: { app: mock }
    spec:
      containers:
        - name: mock
          image: python:3.11-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 2
          volumeMounts:
            - { name: src, mountPath: /app }
      volumes:
        - name: src
          configMap: { name: mock-src }
---
apiVersion: v1
kind: Service
metadata:
  name: mock
spec:
  selector: { app: mock }
  ports:
    - { port: 8080, targetPort: 8080 }
